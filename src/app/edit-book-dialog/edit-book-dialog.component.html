<h1 mat-dialog-title>Edit Book</h1>
<div mat-dialog-content>
  <mat-form-field>
    <mat-label>Name</mat-label>
    <input matInput [(ngModel)]="data.name">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Writer Name</mat-label>
    <input matInput [(ngModel)]="data.writerName">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Publishing Date</mat-label>
    <input matInput [(ngModel)]="data.publishingDate">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Category Name</mat-label>
    <input matInput [(ngModel)]="data.categoryName">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Age Name</mat-label>
    <input matInput [(ngModel)]="data.ageName">
  </mat-form-field>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="onNoClick()">Cancel</button>
  <button mat-button [mat-dialog-close]="data">Save</button>
</div>
